version: '3.8'

services:
  app:
    image: wilburforce83/dyslibria:${IMAGE_TAG:-latest}
    container_name: dyslibria
    pull_policy: always
    ports:
      - "3000:3000"
      - "1900:1900"
    volumes:
      - dyslibria_uploads:/usr/src/app/uploads
      - dyslibria_processed:/usr/src/app/processed
      - dyslibria_db:/usr/src/app/db
      - dyslibria_failed:/usr/src/app/failed
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:' + (process.env.MAIN_PORT || 3000) + '/healthz').then((res) => { process.exit(res.ok ? 0 : 1); }).catch(() => process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    restart: unless-stopped

volumes:
  dyslibria_uploads:
  dyslibria_processed:
  dyslibria_db:
  dyslibria_failed:
