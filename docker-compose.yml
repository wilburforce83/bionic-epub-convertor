version: '3.8'

services:
  app:
    image: wilburforce83/dyslibria:${IMAGE_TAG:-latest}
    container_name: dyslibria
    pull_policy: always
    env_file:
      - .env
    ports:
      - "${MAIN_PORT:-3000}:${MAIN_PORT:-3000}"
      - "${WEBDAV_PORT:-1900}:${WEBDAV_PORT:-1900}"
    volumes:
      - ./uploads:/usr/src/app/uploads
      - ./processed:/usr/src/app/processed
      - ./db:/usr/src/app/db
      - ./failed:/usr/src/app/failed
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:' + (process.env.MAIN_PORT || 3000) + '/healthz').then((res) => { process.exit(res.ok ? 0 : 1); }).catch(() => process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    restart: unless-stopped
