<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Dyslibria Reader</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#93381f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Dyslibria">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png">
  <link rel="stylesheet" type="text/css" href="semantic.min.css">
  <link rel="stylesheet" type="text/css" href="reader.css">
  <script defer src="jszip.min.js"></script>
  <script defer src="epub.js"></script>
  <script defer src="/app-theme.js"></script>
  <script defer src="pwa.js"></script>
  <script defer src="reader.js"></script>
</head>

<body>
  <div class="reader-app theme-paper" id="readerApp">
    <main class="reader-stage" aria-label="EPUB reader">
      <div class="viewer-frame">
        <div id="viewer"></div>
      </div>

      <div class="reader-top-actions hidden" id="progressActions" hidden>
        <a class="ui button action-button" href="index.html" id="closeBookButton">Close book</a>
      </div>

      <section class="loading-card" id="loadingCard" aria-live="polite">
        <p class="eyebrow">Reading now</p>
        <div class="reader-wordmark"><span class="brand-kicker">Dys</span>libria</div>
        <h1 id="loadingTitle">Opening book…</h1>
        <p class="reader-subtitle" id="loadingMeta">Preparing reader shell</p>
      </section>
    </main>

    <aside class="progress-panel" id="progressPanel" aria-hidden="true">
      <div class="panel-header">
        <div>
          <p class="eyebrow">Reading progress</p>
          <h2 id="progressTitle">Opening book…</h2>
          <p class="reader-subtitle" id="progressMeta">Finding saved position</p>
        </div>
        <button class="text-button" id="closeProgress" type="button">Close</button>
      </div>

      <section class="status-card">
        <div class="progress-row">
          <strong id="progressLabel">0%</strong>
          <span id="chapterLabel">Loading chapter data…</span>
        </div>
        <div class="progress-track" aria-hidden="true">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <p class="reader-subtitle progress-detail" id="progressDetail">Reading progress saves automatically.</p>
      </section>
    </aside>

    <aside class="settings-panel" id="settingsPanel" aria-hidden="true">
      <div class="panel-header">
        <div>
          <p class="eyebrow">Display</p>
          <div class="reader-wordmark panel-wordmark"><span class="brand-kicker">Dys</span>libria</div>
          <h1 id="bookTitle">Opening book…</h1>
          <p class="reader-subtitle" id="bookMeta">Preparing reader shell</p>
        </div>
        <button class="text-button" id="closeSettings" type="button">Close</button>
      </div>

      <div class="panel-actions">
        <button class="ui button action-button hidden" id="installButton" type="button" hidden>Install app</button>
      </div>

      <div class="settings-grid">
        <label class="setting-field">
          <span>Theme</span>
          <select id="themeSelect">
            <option value="paper">Paper</option>
            <option value="sepia">Sepia</option>
            <option value="midnight">Midnight</option>
          </select>
        </label>

        <label class="setting-field">
          <span>Font family</span>
          <select id="fontFamilySelect">
            <option value="accessible">Accessible sans</option>
            <option value="serif">Bookish serif</option>
            <option value="classic">Classic sans</option>
          </select>
        </label>

        <label class="setting-field">
          <span>Font size <strong id="fontSizeValue">110%</strong></span>
          <input id="fontSizeInput" type="range" min="90" max="160" step="5" value="110">
        </label>

        <label class="setting-field">
          <span>Line height <strong id="lineHeightValue">1.6</strong></span>
          <input id="lineHeightInput" type="range" min="1.3" max="2" step="0.1" value="1.6">
        </label>

        <label class="setting-field">
          <span>Page spread</span>
          <select id="layoutSelect">
            <option value="auto">Auto</option>
            <option value="always">Always show spreads</option>
            <option value="none">Single page only</option>
          </select>
        </label>

        <label class="setting-field">
          <span>Reading mode</span>
          <select id="flowSelect">
            <option value="paginated">Paginated</option>
            <option value="scrolled-doc">Continuous scroll</option>
          </select>
        </label>
      </div>

      <section class="toc-section">
        <div class="section-heading">
          <h2>Contents</h2>
        </div>
        <nav class="toc-tree" id="tocList" aria-label="Table of contents"></nav>
      </section>
    </aside>

    <div class="reader-scrim" id="readerScrim"></div>
  </div>
</body>

</html>
